name: Sync to Gitee

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Mirror to Gitee
      uses: wearerequired/git-mirror-action@v1.2.0
      env:
        SSH_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
      with:
        source-repo: "https://github.com/${{ github.repository }}.git"
        destination-repo: "git@gitee.com:your-username/your-repo.git"
    
    - name: Sync via HTTPS (Alternative)
      if: failure()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git push --mirror https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_PASSWORD }}@gitee.com/your-username/your-repo.git
      continue-on-error: true
