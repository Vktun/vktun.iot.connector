name: Sync to Gitee

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITEE_REPO: ${{ github.repository }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    
    - name: Mirror to Gitee via SSH
      uses: wearerequired/git-mirror-action@v1.2.0
      env:
        SSH_PRIVATE_KEY: ${{ secrets.GITEE_PRIVIATE_KEY }}
      with:
        source-repo: "https://github.com/${{ github.repository }}.git"
        destination-repo: "git@gitee.com:${{ env.GITEE_REPO }}.git"